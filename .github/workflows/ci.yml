name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "images/**"
      - "examples/**"
      - "LICENSE"
      - "README.md"
      - "CHANGELOG.md"
      - "SECURITY.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "images/**"
      - "examples/**"
      - "LICENSE"
      - "README.md"
      - "CHANGELOG.md"
      - "SECURITY.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate SKILL.md frontmatter
        run: |
          python3 -c "
          import sys, os
          for root, dirs, files in os.walk('skills'):
              for f in files:
                  if f == 'SKILL.md':
                      path = os.path.join(root, f)
                      content = open(path).read()
                      if not content.startswith('---'):
                          print(f'{path}: missing YAML frontmatter')
                          sys.exit(1)
                      parts = content.split('---', 2)
                      if len(parts) < 3:
                          print(f'{path}: invalid frontmatter format')
                          sys.exit(1)
                      fm = parts[1]
                      if 'name:' not in fm:
                          print(f'{path}: frontmatter missing name')
                          sys.exit(1)
                      if 'description:' not in fm:
                          print(f'{path}: frontmatter missing description')
                          sys.exit(1)
                      print(f'{path}: valid')
          "

      - name: Validate YAML files
        run: |
          python3 -c "
          import yaml, glob, sys
          errors = []
          for pattern in ['.github/**/*.yml', '.github/**/*.yaml']:
              for f in glob.glob(pattern, recursive=True):
                  try:
                      yaml.safe_load(open(f))
                  except Exception as e:
                      errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('All YAML files valid')
          "

      - name: Validate skill and plugin versions match
        run: |
          python3 -c "
          import json, re, sys
          skill = open('skills/ai-ready/SKILL.md').read()
          match = re.search(r'^metadata:\n  version: \"([^\"]+)\"', skill, re.MULTILINE)
          if not match:
              print('skills/ai-ready/SKILL.md: metadata.version not found')
              sys.exit(1)
          skill_version = match.group(1)
          plugin_version = json.load(open('.github/plugin/plugin.json'))['version']
          if skill_version != plugin_version:
              print(f'version mismatch: SKILL.md={skill_version} plugin.json={plugin_version}')
              sys.exit(1)
          print(f'Versions match: {skill_version}')
          "
